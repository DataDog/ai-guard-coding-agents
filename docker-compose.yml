services:
  mitmproxy:
    image: mitmproxy/mitmproxy:12.2.3
    command: mitmweb --web-host 0.0.0.0 --set web_password=ai_guard --set "view_filter=~u /hook/ | ~u ai-guard | ~u api.anthropic.com"
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - mitmproxy-data:/home/mitmproxy/.mitmproxy

  claude:
    build:
      dockerfile: docker/claude/Dockerfile
    env_file:
      - .env
    environment:
      ANTHROPIC_BASE_URL: http://claude:29279
      DD_AI_GUARD_PROXY_HOST: 0.0.0.0
      DD_AI_GUARD_PROXY_PORT: 29279
      HTTPS_PROXY: http://mitmproxy:8080
      NODE_EXTRA_CA_CERTS: /mitmproxy-certs/mitmproxy-ca-cert.pem
    depends_on:
      - mitmproxy
    volumes:
      - claude-home:/home/claude
      - mitmproxy-data:/mitmproxy-certs:ro
      - ./docker/.ai_guard:/home/claude/.ai_guard

volumes:
  mitmproxy-data:
  claude-home: