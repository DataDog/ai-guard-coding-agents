version: 2
updates:
  # Python dependencies managed via uv (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    groups:
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      ruff:
        patterns:
          - "ruff"
    ignore:
      # Pinned to a custom branch in [tool.uv.sources]; managed manually.
      - dependency-name: "ddtrace"
