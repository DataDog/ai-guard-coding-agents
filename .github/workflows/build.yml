name: Build native executables

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      release_tag:
        description: "When set, attach built artifacts to this GitHub Release tag."
        type: string
        required: false
        default: ""
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Key on the release tag (when invoked by release.yml) so a long-running
  # main-branch build doesn't cancel the release-time build of the same code.
  group: ${{ github.workflow }}-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    needs: test
    permissions:
      # `write` is required only for the final `gh release upload` step;
      # all earlier steps in this job operate read-only on the repo.
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.test.outputs.platforms) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # ddtrace is pinned to a git source whose tests/ tree includes paths
      # > 260 chars; without longpaths Windows checkout fails mid-clone.
      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --system core.longpaths true

      # Pin a Python version so uv installs and manages its own interpreter
      # rather than the runner's externally-managed system Python (PEP 668).
      # Without this, `uv pip install --system` fails on ubuntu-24.04 and
      # macos-latest images that ship a marked-externally-managed Python.
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build executable
        run: uv run pyinstaller ai-guard.spec

      # PyInstaller's onedir output is ``dist/ai-guard/`` (launcher +
      # ``_internal/`` siblings). Rename the directory so the tarball's
      # top-level entry matches the platform artifact name install.sh expects.
      - name: Rename bundle
        run: mv dist/ai-guard dist/${{ matrix.artifact }}

      - name: Package bundle (Unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: dist
        run: Compress-Archive -Path "${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Generate SHA-256 sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - name: Generate SHA-256 sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: dist
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.artifact }}.zip").Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii -NoNewline "${{ matrix.artifact }}.zip.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: runner.os != 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: runner.os == 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.zip.sha256

      # Attach assets to the GitHub Release when the workflow is invoked for
      # a release — either by release.yml (reusable-workflow call with
      # `release_tag`) or by a manual `v*` tag push (recovery path).
      - name: Resolve release tag
        id: release_tag
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Attach assets to GitHub Release (Unix)
        if: steps.release_tag.outputs.tag != '' && runner.os != 'Windows'
        working-directory: dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        # release-please creates the Release before this job runs, so the
        # view check normally succeeds and the create branch is a no-op.
        # For the manual recovery path (`git push origin vX.Y.Z`) no
        # Release exists yet — the first matrix runner creates it with
        # auto-generated notes; later runners see it and skip. `|| true`
        # tolerates the race where two runners try to create at once.
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" --generate-notes || true
          fi
          gh release upload "$RELEASE_TAG" \
            "${{ matrix.artifact }}.tar.gz" \
            "${{ matrix.artifact }}.tar.gz.sha256" \
            --clobber --repo "$GITHUB_REPOSITORY"

      - name: Attach assets to GitHub Release (Windows)
        if: steps.release_tag.outputs.tag != '' && runner.os == 'Windows'
        working-directory: dist
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release view "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" `
              --title "$env:RELEASE_TAG" --generate-notes
            # tolerate race with another matrix runner that just created it
            $LASTEXITCODE = 0
          }
          gh release upload "$env:RELEASE_TAG" `
            "${{ matrix.artifact }}.zip" `
            "${{ matrix.artifact }}.zip.sha256" `
            --clobber --repo "$env:GITHUB_REPOSITORY"
