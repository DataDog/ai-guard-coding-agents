name: Build native executables

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      release_tag:
        description: "When set, attach built artifacts to this GitHub Release tag."
        type: string
        required: false
        default: ""
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Key on the release tag (when invoked by release.yml) so a long-running
  # main-branch build doesn't cancel the release-time build of the same code.
  group: ${{ github.workflow }}-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    needs: test
    permissions:
      # Read-only on the repo: this job builds, signs, and uploads CI
      # artifacts, but never writes to the GitHub Release — that is deferred to
      # the environment-gated `publish-release` job below.
      contents: read
      # Build provenance attestation: `id-token: write` lets the runner mint
      # the OIDC token Sigstore/Fulcio signs against, and `attestations: write`
      # records the attestation against the repo so `gh attestation verify`
      # can find it. See the "Attest build provenance" step below.
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.test.outputs.platforms) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # ddtrace is pinned to a git source whose tests/ tree includes paths
      # > 260 chars; without longpaths Windows checkout fails mid-clone.
      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --system core.longpaths true

      # Pin a Python version so uv installs and manages its own interpreter
      # rather than the runner's externally-managed system Python (PEP 668).
      # Without this, `uv pip install --system` fails on ubuntu-24.04 and
      # macos-latest images that ship a marked-externally-managed Python.
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build executable
        run: uv run pyinstaller ai-guard.spec

      # PyInstaller's onedir output is ``dist/ai-guard/`` (launcher +
      # ``_internal/`` siblings). Rename the directory so the tarball's
      # top-level entry matches the platform artifact name install.sh expects.
      - name: Rename bundle
        run: mv dist/ai-guard dist/${{ matrix.artifact }}

      - name: Package bundle (Unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: dist
        run: Compress-Archive -Path "${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Generate SHA-256 sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - name: Generate SHA-256 sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: dist
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.artifact }}.zip").Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii -NoNewline "${{ matrix.artifact }}.zip.sha256"

      # Sign the artifact's build provenance via Sigstore (keyless: the
      # signature is bound to this workflow's OIDC identity and recorded in the
      # Rekor transparency log — no long-lived key to manage). The checksum
      # sidecar only proves integrity; this proves the bundle was built by this
      # repo's workflow, which is what install.sh verifies with
      # `gh attestation verify`.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/${{ matrix.artifact }}${{ runner.os == 'Windows' && '.zip' || '.tar.gz' }}

      # Stage the Sigstore bundle next to the artifact under a deterministic
      # name so it can ride along as a release asset. install.sh downloads it
      # and verifies offline via `--bundle`, so a client doesn't need to be
      # `gh auth`-logged-in to check the signature.
      - name: Stage attestation bundle (Unix)
        if: runner.os != 'Windows'
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/${{ matrix.artifact }}.tar.gz.sigstore.json"

      - name: Stage attestation bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "${{ steps.attest.outputs.bundle-path }}" "dist/${{ matrix.artifact }}.zip.sigstore.json"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: runner.os != 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256
            dist/${{ matrix.artifact }}.tar.gz.sigstore.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: runner.os == 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.zip.sha256
            dist/${{ matrix.artifact }}.zip.sigstore.json

      # The bootstrap install.sh is the root of trust for the whole flow — it
      # runs the checksum and signature checks, so it must itself be pinned and
      # verifiable rather than fetched from the mutable tip of `main`. Attest it
      # here and publish it (in publish-release) as a versioned release asset so
      # users can verify it before running. install.sh is platform-independent,
      # so this runs once. Gate on the artifact name rather than the runner
      # label so retargeting a leg's runner (e.g. ubuntu-latest -> ubuntu-24.04)
      # can't silently stop the installer from being published.
      - name: Attest installer script
        id: attest_installer
        if: matrix.artifact == 'ai-guard-linux-x86_64'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: scripts/install.sh

      - name: Stage installer attestation bundle
        if: matrix.artifact == 'ai-guard-linux-x86_64'
        run: cp "${{ steps.attest_installer.outputs.bundle-path }}" scripts/install.sh.sigstore.json

      - name: Upload installer artifact
        if: matrix.artifact == 'ai-guard-linux-x86_64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: installer
          path: |
            scripts/install.sh
            scripts/install.sh.sigstore.json

  # Publish every built + signed asset to the GitHub Release in one place,
  # behind the `release` environment. Required reviewers on that environment
  # mean a release can't be published by a single identity: the provenance
  # attestation proves *who built* an artifact, not that publishing it was
  # *authorised* — this human gate provides that. Keeping publish out of the
  # matrix build job also lets that job stay `contents: read`.
  publish-release:
    name: Publish release assets
    needs: build
    if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Pull every per-platform artifact plus the installer into one flat
      # directory; each was uploaded under its own name by the build matrix.
      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Attach assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        # release-please creates the Release before this workflow runs, so the
        # view check normally succeeds. The create branch covers the manual
        # recovery path (`git push origin vX.Y.Z`), where no Release exists yet.
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" --generate-notes
          fi
          gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
