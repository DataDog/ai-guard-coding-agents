name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Mint a short-lived installation token for the dedicated GitHub App
      # (RELEASE_PLEASE_APP_ID / RELEASE_PLEASE_APP_PRIVATE_KEY). The
      # default GITHUB_TOKEN can't be used here: GitHub does not trigger
      # downstream workflows for events authored by GITHUB_TOKEN, so the
      # release PR would land with no `pull_request` checks. A token
      # minted from a GitHub App bypasses that safeguard.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build.yml
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
    secrets: inherit
